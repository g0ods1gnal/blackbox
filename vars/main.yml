####################################
# Blackbox Configuration Variables #
####################################

# User Configuration
# ==================
main_user: goodsignal
main_user_home: /home/goodsignal

# System Configuration
# ====================
hostname: blackbox
timezone: Europe/Lisbon

# Connectivity configuration
# ==========================
ssh:
    port: 22
    enable_sshd: true

# Security Configuration
# ======================
enable_ufw: true
enable_apparmor: true
enable_auditd: true
mac_randomization: true
dns_encryption: true

# Directory Structure
# ===================
homelab_dir: "{{ main_user_home }}/homelab"
directories:
  - "{{ homelab_dir }}/scripts"
  - "{{ homelab_dir }}/configs"
  - "{{ homelab_dir }}/docker-tools"
  - "{{ homelab_dir }}/cheatsheets"
  - "{{ homelab_dir }}/vpn"
  - "{{ main_user_home }}/HTB/Active"
  - "{{ main_user_home }}/HTB/Retired"
  - "{{ main_user_home }}/THM/Rooms"
  - "{{ main_user_home }}/THM/Paths"
  - "{{ main_user_home }}/Documents/Vault"
  - "{{ main_user_home }}/Pictures/Screenshots"
  - "{{ main_user_home }}/Pictures/Wallpapers"


# Package Lists
# =============
base_packages:
  - base
  - base-devel
  - openssh
  - zsh
  - htop
  - curl
  - ulogd
  - iptables
  - tmux
  - rsync
  - iptables
  - coreutils
  - dateutils
  - ufw
  - apparmor
  - audit
  - tor
  - torsocks
  - ethtool
  - wpa_supplicant
  - nmap
  - networkmanager
  - network-manager-applet
  - networkmanager-openconnect
  - networkmanager-openvpn

wm_packages:
  - sway
  - swaylock
  - swayidle
  - swaybg
  - waybar
  - alacritty
  - wofi
  - mako
  - grim
  - slurp
  - wl-clipboard
  - brightnessctl
  - playerctl
  - pamixer
  - pavucontrol
  - ttf-font-awesome
  - ttf-dejavu
  - noto-fonts
  - noto-fonts-emoji

virtualization_packages:
  - qemu-full
  - libvirt
  - virt-manager
  - virt-viewer
  - dnsmasq
  - bridge-utils
  - openbsd-netcat
  - dmidecode

security_tools:
  - nmap
  - masscan
  - rustscan
  - wireshark-qt
  - tcpdump
  - john
  - hashcat
  - hydra
  - gobuster
  - nikto
  - binwalk
  - ghidra
  - radare2
  - clamav

aur_packages:
  - burpsuite
  - librewolf-bin
  - tor-browser
  - obsidian
  - veracrypt
  - mullvad-vpn-bin
