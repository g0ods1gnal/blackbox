---
# Personal Hacking Laptop Configuration Variables

# User Configuration
main_user: goodsignal
main_user_home: /home/goodsignal

# System Configuration
hostname: blackbox
timezone: Europe/Lisbon

# Theme
theme_name: gruvbox-hard-dark

# Gruvbox Hard Dark Colors
gruvbox:
  bg_hard: "#1d2021"
  bg: "#282828"
  bg_soft: "#32302f"
  fg: "#ebdbb2"
  fg_dim: "#a89984"
  gray: "#928374"
  red_dark: "#cc241d"
  red: "#fb4934"
  green_dark: "#98971a"
  green: "#b8bb26"
  yellow_dark: "#d79921"
  yellow: "#fabd2f"
  blue_dark: "#458588"
  blue: "#83a598"
  purple_dark: "#b16286"
  purple: "#d3869b"
  aqua_dark: "#689d6a"
  aqua: "#8ec07c"
  orange_dark: "#d65d0e"
  orange: "#fe8019"

# Directory Structure
homelab_dir: "{{ main_user_home }}/homelab"
directories:
  - "{{ homelab_dir }}/scripts"
  - "{{ homelab_dir }}/configs"
  - "{{ homelab_dir }}/vpn"
  - "{{ main_user_home }}/HTB/Active"
  - "{{ main_user_home }}/HTB/Retired"
  - "{{ main_user_home }}/THM/Rooms"
  - "{{ main_user_home }}/Documents/Vault"
  - "{{ main_user_home }}/Pictures/Screenshots"
  - "{{ main_user_home }}/Pictures/Wallpapers"

# Package Lists
base_packages:
  - base-devel
  - git
  - wget
  - curl
  - vim
  - neovim
  - htop
  - btop
  - tmux
  - fzf
  - ripgrep
  - fd
  - bat
  - eza
  - man-db
  - man-pages

sway_packages:
  - sway
  - swaylock
  - swayidle
  - swaybg
  - waybar
  - alacritty
  - wofi
  - mako
  - grim
  - slurp
  - wl-clipboard
  - brightnessctl
  - playerctl
  - pamixer
  - pavucontrol
  - polkit-gnome
  - xorg-xwayland
  - ttf-jetbrains-mono-nerd
  - ttf-font-awesome
  - ttf-dejavu
  - noto-fonts
  - noto-fonts-emoji

security_packages:
  - ufw
  - apparmor
  - audit
