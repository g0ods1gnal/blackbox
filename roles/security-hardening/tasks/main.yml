---
- name: Install security packages
  pacman:
    name: "{{ security_packages }}"
    state: present

- name: Configure kernel parameters for hardening
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
    sysctl_file: /etc/sysctl.d/99-security-hardening.conf
  loop:
    - { name: 'net.ipv4.ip_forward', value: '1' }
    - { name: 'net.ipv6.conf.all.disable_ipv6', value: '1' }
    - { name: 'net.ipv4.tcp_syncookies', value: '1' }
    - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.accept_source_route', value: '0' }
    - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
    - { name: 'kernel.dmesg_restrict', value: '1' }
    - { name: 'kernel.kptr_restrict', value: '2' }
    - { name: 'kernel.yama.ptrace_scope', value: '3' }
    - { name: 'kernel.kexec_load_disabled', value: '1' }
    - { name: 'kernel.unprivileged_userns_clone', value: '0' }
    - { name: 'kernel.unprivileged_bpf_disabled', value: '1' }
    - { name: 'kernel.perf_event_paranoid', value: '3' }
    - { name: 'vm.swappiness', value: '1' }

- name: Configure MAC address randomization
  copy:
    dest: /etc/NetworkManager/conf.d/00-mac-randomization.conf
    content: |
      [device]
      wifi.scan-rand-mac-address=yes
      
      [connection]
      wifi.cloned-mac-address=random
      ethernet.cloned-mac-address=random
    mode: '0644'
  notify: restart networkmanager

- name: Configure UFW firewall - default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Configure UFW firewall - default deny outgoing
  community.general.ufw:
    state: enabled
    policy: deny
    direction: outgoing

- name: UFW - Allow loopback incoming
  community.general.ufw:
    rule: allow
    interface: lo
    direction: in

- name: UFW - Allow loopback outgoing
  community.general.ufw:
    rule: allow
    interface: lo
    direction: out

- name: UFW - Allow essential outbound
  community.general.ufw:
    rule: allow
    direction: out
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: '53', proto: 'udp' }
    - { port: '53', proto: 'tcp' }
    - { port: '67', proto: 'udp' }
    - { port: '68', proto: 'udp' }
    - { port: '80', proto: 'tcp' }
    - { port: '443', proto: 'tcp' }
    - { port: '123', proto: 'udp' }
    - { port: '1194', proto: 'udp' }
    - { port: '51820', proto: 'udp' }

- name: Enable AppArmor
  systemd:
    name: apparmor
    enabled: yes
    state: started

- name: Find systemd-boot entry files
  find:
    paths: /boot/loader/entries
    patterns: "*linux.conf"
    excludes: "*fallback.conf"
  register: boot_entries

- name: Add security parameters to boot (if not present)
  shell: |
    if ! grep -q "lsm=" "{{ item.path }}"; then
      sed -i.bak 's|^options \(.*\)$|options \1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf|' "{{ item.path }}"
      echo "CHANGED"
    else
      echo "ALREADY_SET"
    fi
  loop: "{{ boot_entries.files }}"
  register: boot_update
  changed_when: "'CHANGED' in boot_update.stdout"
  when: boot_entries.files | length > 0

- name: Configure secure DNS servers via NetworkManager
  copy:
    dest: /etc/NetworkManager/conf.d/dns-servers.conf
    content: |
      [main]
      dns=default
      
      [connection]
      connection.dns=1.1.1.1,1.0.0.1,8.8.8.8
    mode: '0644'
  notify: restart networkmanager

- name: Ensure resolv.conf is not immutable
  command: chattr -i /etc/resolv.conf
  ignore_errors: yes
  changed_when: false

- name: Disable unnecessary services
  systemd:
    name: "{{ item }}"
    enabled: no
    state: stopped
  loop:
    - bluetooth.service
    - cups.service
    - avahi-daemon.service
  ignore_errors: yes

- name: Enable audit daemon
  systemd:
    name: auditd
    enabled: yes
    state: started

- name: Add security aliases to bashrc
  blockinfile:
    path: "{{ main_user_home }}/.bashrc"
    block: |
      # Security aliases
      alias ports='sudo netstat -tulanp'
      alias listening='sudo lsof -i -P -n | grep LISTEN'
      alias myip='curl -s ifconfig.me'
      alias vpncheck='ip addr show tun0 2>/dev/null || echo "No VPN connected"'
    marker: "# {mark} ANSIBLE MANAGED - SECURITY ALIASES"
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    create: yes
    mode: '0644'
