version: '3.8'

services:
  # DVWA - Damn Vulnerable Web Application
  dvwa:
    image: vulnerables/web-dvwa
    ports:
      - "8080:80"
    networks:
      - lab-net
    restart: unless-stopped

  # OWASP Juice Shop
  juice-shop:
    image: bkimminich/juice-shop
    ports:
      - "3000:3000"
    networks:
      - lab-net
    restart: unless-stopped

  # WebGoat
  webgoat:
    image: webgoat/webgoat
    ports:
      - "8081:8080"
      - "9090:9090"
    networks:
      - lab-net
    restart: unless-stopped
    environment:
      - WEBGOAT_HOST=webgoat.local
      - WEBWOLF_HOST=webwolf.local

  # Vulnerable WordPress
  wordpress-vuln:
    image: wordpress:4.8
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    ports:
      - "8082:80"
    networks:
      - lab-net
    depends_on:
      - db
    restart: unless-stopped

  # MySQL for WordPress
  db:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    networks:
      - lab-net
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/mysql

  # Network Multi-Tool (for debugging)
  multitool:
    image: praqma/network-multitool
    command: sleep infinity
    networks:
      - lab-net
    restart: unless-stopped

  # mitmproxy for traffic inspection
  mitmproxy:
    image: mitmproxy/mitmproxy
    ports:
      - "8083:8080"
      - "8084:8081"
    networks:
      - lab-net
    command: mitmweb --web-host 0.0.0.0 --set block_global=false
    restart: unless-stopped

networks:
  lab-net:
    driver: bridge

volumes:
  db-data:
