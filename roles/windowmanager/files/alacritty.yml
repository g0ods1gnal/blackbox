# Alacritty Configuration

window:
  padding:
    x: 10
    y: 10
  opacity: 0.95

font:
  normal:
    family: DejaVu Sans Mono
    style: Regular
  bold:
    family: DejaVu Sans Mono
    style: Bold
  italic:
    family: DejaVu Sans Mono
    style: Italic
  size: 11.0

colors:
  primary:
    background: '0x1e1e1e'
    foreground: '0xd4d4d4'
  
  normal:
    black:   '0x1e1e1e'
    red:     '0xf44747'
    green:   '0x4ec9b0'
    yellow:  '0xffaf00'
    blue:    '0x0a7aca'
    magenta: '0xc586c0'
    cyan:    '0x4ec9b0'
    white:   '0xd4d4d4'

cursor:
  style:
    shape: Block
    blinking: On

selection:
  save_to_clipboard: true

shell:
  program: /bin/bash
  args:
    - --login

key_bindings:
  - { key: V, mods: Control|Shift, action: Paste }
  - { key: C, mods: Control|Shift, action: Copy }
  - { key: Plus, mods: Control, action: IncreaseFontSize }
  - { key: Minus, mods: Control, action: DecreaseFontSize }
  - { key: Key0, mods: Control, action: ResetFontSize }
