---
- name: Install zsh and dependencies
  pacman:
    name:
      - zsh
      - zsh-completions
      - zsh-autosuggestions
      - zsh-syntax-highlighting
    state: present

- name: Check if Oh My Zsh is installed
  stat:
    path: "{{ main_user_home }}/.oh-my-zsh"
  register: ohmyzsh_dir

- name: Install Oh My Zsh
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  become_user: "{{ main_user }}"
  when: not ohmyzsh_dir.stat.exists

- name: Install Powerlevel10k theme
  git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ main_user_home }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1
  become_user: "{{ main_user }}"

- name: Install zsh-autosuggestions plugin
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ main_user_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
  become_user: "{{ main_user }}"

- name: Install zsh-syntax-highlighting plugin
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ main_user_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
  become_user: "{{ main_user }}"

- name: Create .zshrc with Gruvbox theme
  template:
    src: zshrc.j2
    dest: "{{ main_user_home }}/.zshrc"
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    mode: '0644'
    backup: yes

- name: Create Powerlevel10k config with Gruvbox
  template:
    src: p10k.zsh.j2
    dest: "{{ main_user_home }}/.p10k.zsh"
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    mode: '0644'

- name: Change default shell to zsh
  user:
    name: "{{ main_user }}"
    shell: /bin/zsh

- name: Update Alacritty to use zsh
  lineinfile:
    path: "{{ main_user_home }}/.config/alacritty/alacritty.toml"
    regexp: '^program = "/bin/bash"'
    line: 'program = "/bin/zsh"'
    backup: yes
