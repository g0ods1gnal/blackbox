- name: Setup Blackbox
  hosts: localhost
  vars_files:
    - ../vars/main.yml
 
  pre_tasks:
    - name: Display setup message
      debug:
        msg: |
          === Setting up your Blackbox ... ===

    - name: Update pacman cache
      pacman:
        update_cache: yes
      changed_when: false

  roles:
    - role: base-system
      tags: ['base']
    - role: fonts-wallpaper
      tags: ['fonts', 'wallpaper']
    - role: desktop-environment
      tags: ['desktop', 'sway']
    - role: zsh-setup
      tags: ['zsh', 'shell']
    - role: security-hardening
      tags: ['security']
    - role: blackarch
      tags: ['blackarch', 'tools']
    - role: virtualization
      tags: ['virt', 'vm']
    - role: docker
      tags: ['docker', 'containers']
    - role: security-tools
      tags: ['tools']
    - role: lab-scripts
      tags: ['scripts', 'lab']

  post_tasks:
    - name: Display completion message
      debug:
        msg: |
          === Blackbox Setup Complete! ===
