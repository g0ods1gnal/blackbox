---

- name: Install virtualization packages
  pacman:
    name: "{{ virtualization_packages }}"
    state: present

- name: Add user to libvirt group
  user:
    name: "{{ main_user }}"
    groups: libvirt,kvm
    append: yes

- name: Configure libvirt
  lineinfile:
    path: /etc/libvirt/qemu.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    backup: yes
  loop:
    - { regexp: '^#?user = .*', line: 'user = "{{ main_user }}"' }
    - { regexp: '^#?group = .*', line: 'group = "libvirt"' }

- name: Enable and start libvirt services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - libvirtd
    - virtlogd

- name: Create network configuration directory
  file:
    path: /etc/libvirt/qemu/networks
    state: directory
    mode: '0755'

- name: Create isolated network (no internet)
  copy:
    dest: /etc/libvirt/qemu/networks/isolated.xml
    content: |
      <network>
        <name>isolated</name>
        <bridge name='virbr-isolated'/>
        <ip address='192.168.100.1' netmask='255.255.255.0'>
          <dhcp>
            <range start='192.168.100.10' end='192.168.100.254'/>
          </dhcp>
        </ip>
      </network>
    mode: '0644'

- name: Create pentest network (VPN routed)
  copy:
    dest: /etc/libvirt/qemu/networks/pentest.xml
    content: |
      <network>
        <name>pentest</name>
        <bridge name='virbr-pentest'/>
        <forward mode='route'/>
        <ip address='10.10.10.1' netmask='255.255.255.0'>
          <dhcp>
            <range start='10.10.10.10' end='10.10.10.254'/>
          </dhcp>
        </ip>
      </network>
    mode: '0644'

- name: Create defensive network (NAT)
  copy:
    dest: /etc/libvirt/qemu/networks/defensive.xml
    content: |
      <network>
        <name>defensive</name>
        <forward mode='nat'/>
        <bridge name='virbr-defense'/>
        <ip address='10.20.20.1' netmask='255.255.255.0'>
          <dhcp>
            <range start='10.20.20.10' end='10.20.20.254'/>
          </dhcp>
        </ip>
      </network>
    mode: '0644'

- name: Define virtual networks
  command: virsh net-define /etc/libvirt/qemu/networks/{{ item }}.xml
  loop:
    - isolated
    - pentest
    - defensive
  register: net_define
  failed_when: 
    - net_define.rc != 0
    - "'already exists' not in net_define.stderr"
  changed_when: "'already exists' not in net_define.stderr"

- name: Autostart virtual networks
  command: virsh net-autostart {{ item }}
  loop:
    - isolated
    - pentest
    - defensive
  ignore_errors: yes

- name: Start virtual networks
  command: virsh net-start {{ item }}
  loop:
    - isolated
    - pentest
    - defensive
  register: net_start
  failed_when:
    - net_start.rc != 0
    - "'already active' not in net_start.stderr"
  changed_when: "'already active' not in net_start.stderr"
