---

# User Configuration
main_user: goodsignal
main_user_home: /home/goodsignal

# System Configuration
hostname: blackbox
timezone: Europe/Lisbon

# Zsh
zsh_theme: powerlevel10k
default_shell: /bin/zsh

# Theme
theme_name: gruvbox-hard-dark

# Gruvbox Hard Dark Colors
gruvbox:
  bg_hard: "#000000"
  bg: "#0d0d0d"
  bg_soft: "#1a1a1a"
  fg: "#ebdbb2"
  fg_dim: "#928374"
  gray: "#665c54"
  red_dark: "#cc241d"
  red: "#fb4934"
  green_dark: "#98971a"
  green: "#b8bb26"
  yellow_dark: "#d79921"
  yellow: "#fabd2f"
  blue_dark: "#458588"
  blue: "#83a598"
  purple_dark: "#b16286"
  purple: "#d3869b"
  aqua_dark: "#689d6a"
  aqua: "#8ec07c"
  orange_dark: "#d65d0e"
  orange: "#fe8019"

# Directory Structure
homelab_dir: "{{ main_user_home }}/homelab"
directories:
  - "{{ homelab_dir }}/scripts"
  - "{{ homelab_dir }}/configs"
  - "{{ homelab_dir }}/vpn"
  - "{{ main_user_home }}/HTB/Active"
  - "{{ main_user_home }}/HTB/Retired"
  - "{{ main_user_home }}/THM/Rooms"
  - "{{ main_user_home }}/Documents/Vault"
  - "{{ main_user_home }}/Pictures/Screenshots"
  - "{{ main_user_home }}/Pictures/Wallpapers"

# Package Lists
base_packages:
  - base-devel
  - git
  - wget
  - curl
  - vim
  - neovim
  - htop
  - btop
  - tmux
  - tree
  - fzf
  - ripgrep
  - fd
  - bat
  - eza
  - man-db
  - man-pages

sway_packages:
  - sway
  - swaylock
  - swayidle
  - swaybg
  - waybar
  - alacritty
  - wofi
  - mako
  - grim
  - slurp
  - wl-clipboard
  - brightnessctl
  - playerctl
  - pamixer
  - pavucontrol
  - picom
  - polkit-gnome
  - xorg-xwayland
  - ttf-jetbrains-mono-nerd
  - ttf-font-awesome
  - ttf-dejavu
  - noto-fonts
  - noto-fonts-emoji

security_packages:
  - ufw
  - apparmor
  - audit

virtualization_packages:
  - qemu-full
  - libvirt
  - virt-manager
  - virt-viewer
  - dnsmasq
  - bridge-utils
  - openbsd-netcat
  - dmidecode

security_tools:
  - nmap
  - masscan
  - wireshark-qt
  - tcpdump
  - john
  - hashcat
  - hydra
  - nikto
  - binwalk
  - radare2
  - net-tools
  - openvpn
  - wireguard-tools
  - tor
  - torsocks

vm_networks:
  - name: isolated
    bridge: virbr-isolated
    mode: isolated
    ip: 192.168.100.1
    netmask: 255.255.255.0
    dhcp_start: 192.168.100.10
    dhcp_end: 192.168.100.254
  - name: pentest
    bridge: virbr-pentest
    mode: route
    ip: 10.10.10.1
    netmask: 255.255.255.0
    dhcp_start: 10.10.10.10
    dhcp_end: 10.10.10.254
  - name: defensive
    bridge: virbr-defense
    mode: nat
    ip: 10.20.20.1
    netmask: 255.255.255.0
    dhcp_start: 10.20.20.10
    dhcp_end: 10.20.20.254

